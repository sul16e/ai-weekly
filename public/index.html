<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Weekly — 주간 AI·IT 트렌드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root {
  --bg: #0b0d12;
  --bg-card: #12151d;
  --bg-card-hover: #171b26;
  --border: #222735;
  --text: #e8eaf0;
  --text-dim: #8b93a7;
  --text-faint: #565e72;
  --accent: #5b8cff;
  --hot: #ff5b5b;
  --official: #34d399;
  --media: #fbbf24;
  --community: #a78bfa;
  --paper: #38bdf8;
  --ko: #ff8fab;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scrollbar-color: #2a3040 var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard Variable", Pretendard, -apple-system, "Apple SD Gothic Neo", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

.wrap { max-width: 1080px; margin: 0 auto; padding: 0 28px 80px; }

/* ---------- 헤더 ---------- */
header {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 40px 0 8px; flex-wrap: wrap; gap: 12px;
}
.logo { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
.logo em { font-style: normal; color: var(--accent); }
.logo .week { font-size: 15px; font-weight: 600; color: var(--text-dim); margin-left: 12px; }
.meta-line { font-size: 13px; color: var(--text-faint); }
.meta-line b { color: var(--text-dim); font-weight: 600; }

.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 0 26px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 10;
  background: linear-gradient(var(--bg) 85%, transparent);
}
.tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  padding: 7px 15px; border-radius: 99px; font-size: 14px; font-weight: 600;
  color: var(--text-dim); background: var(--bg-card); border: 1px solid var(--border);
  cursor: pointer; transition: all .15s;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab.hot-tab.active { background: var(--hot); border-color: var(--hot); }
#search {
  margin-left: auto; padding: 8px 14px; border-radius: 99px;
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
  font-size: 14px; font-family: inherit; width: 180px; outline: none;
}
#search:focus { border-color: var(--accent); }
.btn-broadcast {
  padding: 8px 18px; border-radius: 99px; font-size: 14px; font-weight: 700;
  background: linear-gradient(135deg, #5b8cff, #8b5cf6); color: #fff;
  border: none; cursor: pointer; font-family: inherit;
}
.btn-broadcast:hover { filter: brightness(1.15); }

/* ---------- 섹션 ---------- */
h2.section {
  font-size: 15px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin: 34px 0 14px; display: flex; align-items: center; gap: 8px;
}
h2.section::after { content: ""; flex: 1; height: 1px; background: var(--border); }

/* ---------- 카드 ---------- */
.item {
  display: flex; gap: 16px; align-items: flex-start;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 20px; margin-bottom: 10px;
  transition: all .15s;
}
.item:hover { background: var(--bg-card-hover); border-color: #303850; transform: translateY(-1px); }
.rank {
  font-size: 22px; font-weight: 800; color: var(--text-faint);
  min-width: 34px; text-align: center; line-height: 1.3; font-variant-numeric: tabular-nums;
}
.top3 .rank { color: var(--accent); }
.item-body { flex: 1; min-width: 0; }
.item-title { font-size: 16.5px; font-weight: 650; letter-spacing: -0.2px; }
.item-title:hover { color: var(--accent); }
.item-orig { display: block; font-size: 12.5px; color: var(--text-faint); margin-top: 3px; font-weight: 400; }
.tldr { font-size: 14px; color: #b9c2d8; margin-top: 7px; line-height: 1.5; }
.tldr::before { content: "💡 "; }
details.more { margin-top: 7px; }
details.more summary {
  cursor: pointer; font-size: 12.5px; color: var(--accent); font-weight: 600;
  list-style: none; user-select: none;
}
details.more summary::before { content: "▸ "; }
details.more[open] summary::before { content: "▾ "; }
details.more .detail-body {
  font-size: 13.5px; color: var(--text-dim); line-height: 1.65; margin-top: 8px;
  padding: 12px 14px; background: rgba(255,255,255,0.02);
  border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0;
}
.item-meta { display: flex; gap: 10px; align-items: center; margin-top: 7px; font-size: 12.5px; color: var(--text-dim); flex-wrap: wrap; }
.badge {
  font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 99px;
  border: 1px solid; background: transparent;
}
.badge.official  { color: var(--official); border-color: color-mix(in srgb, var(--official) 40%, transparent); }
.badge.media     { color: var(--media); border-color: color-mix(in srgb, var(--media) 40%, transparent); }
.badge.community { color: var(--community); border-color: color-mix(in srgb, var(--community) 40%, transparent); }
.badge.paper     { color: var(--paper); border-color: color-mix(in srgb, var(--paper) 40%, transparent); }
.badge.ko        { color: var(--ko); border-color: color-mix(in srgb, var(--ko) 40%, transparent); }
.eng { color: var(--text-dim); font-weight: 600; }
.eng.high { color: #ffb84d; }
.hot-flag { color: var(--hot); font-weight: 700; }
.lw { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: rgba(91,140,255,0.12); color: var(--accent); }
.lw.new { background: rgba(52,211,153,0.12); color: var(--official); }
.summary { font-size: 13.5px; color: var(--text-dim); margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.empty { text-align: center; color: var(--text-faint); padding: 60px 0; font-size: 15px; }

/* ---------- 방송 모드 ---------- */
#broadcast {
  position: fixed; inset: 0; background: #07080c; z-index: 100;
  display: none; flex-direction: column; padding: 5vh 7vw;
}
#broadcast.on { display: flex; }
.bc-head { display: flex; justify-content: space-between; align-items: center; color: var(--text-faint); font-size: 15px; font-weight: 600; }
.bc-brand { font-size: 19px; font-weight: 800; color: var(--text); }
.bc-brand em { font-style: normal; color: var(--accent); }
.bc-main { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 1280px; }
.bc-row { display: flex; gap: 44px; align-items: center; }
.bc-content { flex: 1; min-width: 0; }
.bc-img {
  width: min(380px, 30vw); max-height: 48vh; object-fit: cover;
  border-radius: 18px; border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
@media (max-width: 900px) { .bc-img { display: none; } }
.bc-lw { color: var(--text-dim); font-weight: 700; margin-left: 14px; font-size: 20px; }
.bc-rank { font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 18px; }
.bc-rank .hot-flag { margin-left: 14px; font-size: 20px; }
.bc-title { font-size: clamp(30px, 4vw, 52px); font-weight: 800; letter-spacing: -1px; line-height: 1.22; word-break: keep-all; }
.bc-orig { font-size: clamp(15px, 1.4vw, 20px); color: var(--text-faint); margin-top: 14px; font-weight: 500; }
.bc-tldr {
  margin-top: 22px; max-width: 880px; padding: 12px 18px;
  background: color-mix(in srgb, var(--accent) 10%, transparent);
  border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0;
  font-size: clamp(16px, 1.6vw, 22px); font-weight: 600; color: var(--text); line-height: 1.5;
}
.bc-bullets { margin-top: 22px; max-width: 880px; }
.bc-bullets li { font-size: clamp(16px, 1.55vw, 21px); color: var(--text-dim); line-height: 1.55; margin: 0 0 12px 22px; }
.bc-bullets li::marker { color: var(--accent); }
.bc-bullets li b.check { color: var(--media); }
.bc-summary { font-size: clamp(15px, 1.4vw, 19px); color: var(--text-dim); margin-top: 22px; max-width: 850px; line-height: 1.6; }
.bc-meta { display: flex; gap: 16px; align-items: center; margin-top: 34px; font-size: 17px; color: var(--text-dim); }
.bc-meta .badge { font-size: 14px; padding: 4px 14px; }
.bc-url { margin-top: 12px; font-size: 14px; color: var(--text-faint); }
.bc-foot { display: flex; justify-content: space-between; color: var(--text-faint); font-size: 14px; }

/* ---------- 프롬프터 (방송 모드 하단 대본) ---------- */
#prompter {
  margin: 18px 0 14px; padding: 16px 22px; border-radius: 14px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  max-height: 30vh; overflow-y: auto;
}
#prompter.off { display: none; }
.prompter-label { font-size: 12px; color: var(--text-faint); margin-bottom: 8px; font-weight: 600; }
#prompterBody { font-size: 17.5px; line-height: 1.85; color: #dde3f0; white-space: pre-wrap; word-break: keep-all; }
#prompterBody .pron-sec { margin-bottom: 14px; }
#prompterBody .sec-tag { font-size: 12px; font-weight: 700; color: var(--accent); display: block; margin-bottom: 2px; }
mark.pron {
  background: rgba(251,191,36,0.22); color: #ffe08a; border-radius: 5px;
  padding: 0 5px; font-weight: 700;
}
mark.pron .pron-ko { color: #fbbf24; font-size: 0.82em; font-weight: 600; margin-left: 5px; }
mark.pron .pron-ko::before { content: "▸ "; }
.bc-progress { display: flex; gap: 6px; }
.bc-dot { width: 26px; height: 4px; border-radius: 2px; background: var(--border); transition: background .2s; }
.bc-dot.done { background: var(--accent); }

/* ---------- 하단 대본 섹션 ---------- */
.script-divider {
  margin: 70px 0 30px; padding: 18px 24px; border-radius: 14px;
  background: color-mix(in srgb, var(--media) 8%, transparent);
  border: 1px dashed color-mix(in srgb, var(--media) 45%, transparent);
  color: var(--media); font-size: 14px; font-weight: 700; text-align: center;
}
.script-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 22px; margin-bottom: 12px;
}
.script-item h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.script-item h3 .num { color: var(--accent); margin-right: 8px; }
.script-item .orig { font-size: 12.5px; color: var(--text-faint); margin-bottom: 8px; }
.script-item ul { margin: 8px 0 0 20px; }
.script-item li { font-size: 14px; color: var(--text-dim); line-height: 1.6; margin-bottom: 5px; }
.script-item li::marker { color: var(--accent); }
.script-item .para { font-size: 15px; color: #c3cbdf; line-height: 1.8; margin-top: 6px; white-space: pre-wrap; }
.copy-btn {
  font-size: 12px; font-weight: 600; padding: 3px 12px; margin-left: 8px;
  border-radius: 99px; border: 1px solid var(--accent); background: transparent;
  color: var(--accent); cursor: pointer; font-family: inherit; vertical-align: middle;
}
.copy-btn:hover { background: var(--accent); color: #fff; }
.desc-pre {
  font-family: inherit; font-size: 13px; color: var(--text-dim); line-height: 1.6;
  background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; margin-top: 8px; white-space: pre-wrap; word-break: break-all;
  max-height: 300px; overflow-y: auto;
}
.script-item .src-line { font-size: 12px; color: var(--text-faint); margin-top: 10px; word-break: break-all; }

@media (max-width: 640px) {
  .wrap { padding: 0 16px 60px; }
  .rank { min-width: 26px; font-size: 18px; }
  #search { width: 100%; margin-left: 0; }
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <div class="logo"><em>AI</em> WEEKLY<span class="week" id="weekLabel"></span></div>
      <div class="meta-line" id="updatedAt"></div>
    </div>
    <button class="btn-broadcast" onclick="enterBroadcast()">🎙 방송 모드 (B)</button>
  </header>

  <div class="toolbar">
    <div class="tabs" id="tabs">
      <button class="tab active" data-f="all">전체</button>
      <button class="tab hot-tab" data-f="hot">🔥 실시간</button>
      <button class="tab" data-f="global">해외</button>
      <button class="tab" data-f="ko">국내</button>
      <button class="tab" data-f="paper">논문</button>
      <button class="tab" data-f="official">공식 발표</button>
    </div>
    <input id="search" type="text" placeholder="검색…">
    <button class="tab" id="langToggle" title="한/영 표시 전환">Aa EN</button>
  </div>

  <div id="content"></div>
</div>

<!-- 방송 모드 오버레이 -->
<div id="broadcast">
  <div class="bc-head">
    <div class="bc-brand"><em>AI</em> WEEKLY</div>
    <div id="bcWeek"></div>
  </div>
  <div class="bc-main" id="bcMain"></div>
  <div id="prompter">
    <div class="prompter-label"><span id="prompterHint"></span></div>
    <div id="prompterBody"></div>
  </div>
  <div class="bc-foot">
    <div id="bcHelp">← → 이동 · T 대본 · O 원문 열기 · ESC 종료</div>
    <div class="bc-progress" id="bcProgress"></div>
  </div>
</div>

<script>
let DATA = { items: [] };
let ENRICH = {};
let SCRIPT = null;
let filter = "all";
let query = "";
let bcIndex = 0;
let bcItems = [];
let LANG = localStorage.getItem("aiw-lang") || "ko";
let prompterOn = localStorage.getItem("aiw-prompter") !== "off";

const L = (ko, en) => (LANG === "ko" ? ko : en);
const rel = (ts) => {
  if (!ts) return "";
  const h = (Date.now() - ts) / 3600000;
  if (h < 1) return Math.max(1, Math.round(h * 60)) + L("분 전", "m ago");
  if (h < 24) return Math.round(h) + L("시간 전", "h ago");
  return Math.round(h / 24) + L("일 전", "d ago");
};
const fmtEng = (n) => n >= 1000 ? (n / 1000).toFixed(1) + "k" : n;
const typeLabelMap = {
  official: ["공식", "Official"], media: ["미디어", "Media"],
  community: ["커뮤니티", "Community"], paper: ["논문", "Paper"],
};
const typeLabel = new Proxy({}, { get: (_, k) => typeLabelMap[k] ? L(...typeLabelMap[k]) : k });
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
// {{원어|발음}} → 형광 하이라이트 + 읽는 법
const pron = (s) => esc(s).replace(/\{\{([^|{}]+)\|([^|{}]+)\}\}/g, '<mark class="pron">$1<span class="pron-ko">$2</span></mark>');

function filtered() {
  let items = DATA.items;
  if (filter === "hot") items = items.filter((x) => x.hot);
  else if (filter === "ko") items = items.filter((x) => x.lang === "ko");
  else if (filter === "global") items = items.filter((x) => x.lang !== "ko" && x.sourceType !== "paper");
  else if (filter === "paper") items = items.filter((x) => x.sourceType === "paper");
  else if (filter === "official") items = items.filter((x) => x.sourceType === "official");
  if (query) {
    const q = query.toLowerCase();
    items = items.filter((x) =>
      x.title.toLowerCase().includes(q) ||
      x.source.toLowerCase().includes(q) ||
      (ENRICH[x.title]?.ko || "").toLowerCase().includes(q));
  }
  return items;
}

function badges(x) {
  let b = `<span class="badge ${x.sourceType}">${typeLabel[x.sourceType] || x.sourceType}</span>`;
  if (x.lang === "ko") b += ` <span class="badge ko">국내</span>`;
  return b;
}

// 제목 구조: 훅(메인) > 한글 번역(부제) > 원문(부제)
function enrichOf(x) { return ENRICH[x.title] || {}; }
function koOf(x) {
  if (x.lang === "ko") return null;
  return enrichOf(x).ko || null;
}
function bulletsOf(x) { return enrichOf(x).bullets || null; }
function mainTitleOf(x) {
  const e = enrichOf(x);
  if (LANG === "en") return x.title; // EN 모드: 원문 우선 (국내 소스는 한국어 원문 그대로)
  return e.hook || koOf(x) || x.title;
}
function subTitlesOf(x) {
  const e = enrichOf(x);
  if (LANG === "en") return []; // EN 모드: 한글 부제 숨김
  const subs = [];
  if (e.hook) subs.push(koOf(x) || (x.lang === "ko" ? x.title : null));
  if (x.lang !== "ko" && (e.hook || koOf(x))) subs.push(x.title);
  return [...new Set(subs.filter(Boolean))];
}

function itemHTML(x, i, showRank) {
  const eng = x.engagement != null
    ? `<span class="eng ${x.engagement > 500 ? "high" : ""}">▲ ${fmtEng(x.engagement)}</span>` : "";
  const com = x.comments ? `<span>💬 ${fmtEng(x.comments)}</span>` : "";
  const hot = x.hot ? `<span class="hot-flag">🔥 NOW</span>` : "";
  const lw = x.lastWeekRank
    ? `<span class="lw">${L(`지난주 ${x.lastWeekRank}위`, `Last wk #${x.lastWeekRank}`)}</span>`
    : DATA.prevWeek && showRank ? `<span class="lw new">NEW</span>` : "";
  const e = enrichOf(x);
  const subs = subTitlesOf(x);
  // EN 모드: 한글 생성물 대신 원문 요약(영어) 표시
  const tldr = LANG === "en" ? "" : e.tldr || "";
  const detail = LANG === "en" ? x.summary || "" : e.detail || "";
  const fallbackSummary = !tldr && !detail && x.summary ? `<div class="summary">${esc(x.summary)}</div>` : "";
  const detailBody = LANG === "en" ? detail : [detail, !detail && x.summary ? x.summary : ""].filter(Boolean).join(" ");
  return `<div class="item ${showRank && i < 3 ? "top3" : ""}">
    ${showRank ? `<div class="rank">${i + 1}</div>` : ""}
    <div class="item-body">
      <a class="item-title" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(mainTitleOf(x))}${subs.length ? `<span class="item-orig">${subs.map(esc).join(" · ")}</span>` : ""}</a>
      <div class="item-meta">
        ${badges(x)} <b>${esc(x.source)}</b> ${eng} ${com} <span>${rel(x.publishedAt)}</span> ${hot} ${lw}
      </div>
      ${tldr ? `<div class="tldr">${esc(tldr)}</div>` : ""}
      ${fallbackSummary}
      ${detailBody && (detail || tldr) ? `<details class="more"><summary>${L("자세히 보기", "Details")}</summary><div class="detail-body">${esc(detailBody)}</div></details>` : ""}
    </div>
  </div>`;
}

// TOP 10은 한 소스가 최대 3개까지만 — 소스 다양성 확보 (전체 탭에서만 적용)
function pickTop(items, n) {
  if (filter !== "all") return items.slice(0, n);
  const top = [], counts = {};
  for (const x of items) {
    if ((counts[x.source] || 0) >= 3) continue;
    counts[x.source] = (counts[x.source] || 0) + 1;
    top.push(x);
    if (top.length === n) break;
  }
  return top;
}

function render() {
  const items = filtered();
  const el = document.getElementById("content");
  if (!items.length) { el.innerHTML = `<div class="empty">${L("해당하는 소식이 없습니다", "No matching news")}</div>`; return; }
  const top = pickTop(items, 10);
  const topSet = new Set(top);
  const rest = items.filter((x) => !topSet.has(x)).slice(0, 70);
  el.innerHTML =
    `<h2 class="section">📌 TOP 10</h2>` +
    top.map((x, i) => itemHTML(x, i, true)).join("") +
    (rest.length ? `<h2 class="section">${L("더 보기", "More")}</h2>` + rest.map((x, i) => itemHTML(x, i, false)).join("") : "") +
    scriptHTML(top);
}

// 하단 대본 — 풀스크린 방송 모드(B)에는 나오지 않는 영역
function scriptHTML(top) {
  // 완성 대본(script.json)이 있으면 문장형으로 표시
  if (SCRIPT?.items?.length) {
    const dur = SCRIPT.durationSec ? ` · 예상 길이 ${Math.floor(SCRIPT.durationSec / 60)}분 ${SCRIPT.durationSec % 60}초` : "";
    const titleBlock = `<div class="script-item">
      <h3>🎬 영상 제목 후보</h3>
      <ul>${(SCRIPT.videoTitles || []).map((t) => `<li>${esc(t)}</li>`).join("")}</ul>
      <h3 style="margin-top:14px">🖼 썸네일 문구 후보</h3>
      <ul>${(SCRIPT.thumbnailTexts || []).map((t) => `<li>${esc(t)}</li>`).join("")}</ul>
      ${SCRIPT.description ? `<h3 style="margin-top:14px">📋 영상 설명란 <button class="copy-btn" onclick="copyDesc(this)">복사</button></h3>
      <pre class="desc-pre">${esc(SCRIPT.description)}</pre>` : ""}
    </div>`;
    const intro = `<div class="script-item"><h3>인트로</h3><p class="para">${pron(SCRIPT.intro || "")}</p></div>`;
    const rows = SCRIPT.items.map((it) => {
      const t = SCRIPT.top?.find((p) => p.rank === it.rank);
      const x = t ? DATA.items.find((d) => d.title === t.title) : null;
      const head = x ? mainTitleOf(x) : t?.title || `#${it.rank}`;
      return `<div class="script-item">
        <h3><span class="num">${it.rank}.</span>${esc(head)}</h3>
        ${x && subTitlesOf(x).length ? `<div class="orig">${subTitlesOf(x).map(esc).join(" · ")}</div>` : ""}
        <p class="para">${pron(it.para)}</p>
        ${x ? `<div class="src-line">${esc(x.source)} · ${esc(x.url)}</div>` : ""}
      </div>`;
    }).join("");
    const outro = `<div class="script-item"><h3>아웃트로</h3><p class="para">${pron(SCRIPT.outro || "")}</p></div>`;
    return `<div class="script-divider">📝 완성 대본 ${esc(SCRIPT.date || "")}${dur} (여기부터는 방송 모드 녹화에 안 나오는 영역 — 그대로 읽으면 됩니다)</div>${titleBlock}${intro}${rows}${outro}`;
  }
  // 폴백: 해설 요점 버전
  const rows = top.map((x, i) => {
    const bullets = bulletsOf(x);
    return `<div class="script-item">
      <h3><span class="num">${i + 1}.</span>${esc(mainTitleOf(x))}</h3>
      ${subTitlesOf(x).length ? `<div class="orig">${subTitlesOf(x).map(esc).join(" · ")}</div>` : ""}
      ${bullets ? `<ul>${bullets.map((b) => `<li>${esc(b)}</li>`).join("")}</ul>`
        : x.summary ? `<ul><li>${esc(x.summary)}</li></ul>` : `<ul><li>해설 미생성 — <code>npm run enrich</code> 실행</li></ul>`}
      <div class="src-line">${esc(x.source)} · ${esc(x.url)}</div>
    </div>`;
  }).join("");
  return `<div class="script-divider">📝 방송 대본 요점 (여기부터는 방송 모드 녹화에 안 나오는 영역 — 완성 대본은 npm run script)</div>${rows}`;
}

/* ---------- 방송 모드 ---------- */
function enterBroadcast() {
  bcItems = pickTop(filtered(), 10);
  if (!bcItems.length) return;
  bcIndex = 0;
  document.getElementById("broadcast").classList.add("on");
  document.getElementById("bcWeek").textContent = document.getElementById("weekLabel").textContent;
  renderBC();
}
function exitBroadcast() { document.getElementById("broadcast").classList.remove("on"); }
function renderBC() {
  const x = bcItems[bcIndex];
  const eng = x.engagement != null ? `<span class="eng high">▲ ${fmtEng(x.engagement)}</span>` : "";
  const e = enrichOf(x);
  const subs = subTitlesOf(x);
  const bullets = LANG === "en" ? null : bulletsOf(x);
  const detail = bullets
    ? `<ul class="bc-bullets">${bullets.map((b) => `<li>${esc(b).replace(/^방송 전 체크:/, '<b class="check">방송 전 체크:</b>')}</li>`).join("")}</ul>`
    : x.summary ? `<div class="bc-summary">${esc(x.summary)}</div>` : "";
  const lw = x.lastWeekRank
    ? `<span class="bc-lw">${L(`지난주 ${x.lastWeekRank}위 →`, `Last week #${x.lastWeekRank} →`)}</span>`
    : DATA.prevWeek ? `<span class="bc-lw">${L("이번 주 신규", "NEW this week")}</span>` : "";
  document.getElementById("bcMain").innerHTML = `
    <div class="bc-rank">TOP ${bcIndex + 1}${lw}${x.hot ? '<span class="hot-flag">🔥 지금 뜨는 이슈</span>' : ""}</div>
    <div class="bc-row">
      <div class="bc-content">
        <div class="bc-title">${esc(mainTitleOf(x))}</div>
        ${subs.length ? `<div class="bc-orig">${subs.map(esc).join(" — ")}</div>` : ""}
        ${LANG !== "en" && e.tldr ? `<div class="bc-tldr">${esc(e.tldr)}</div>` : ""}
        ${detail}
      </div>
      ${e.img ? `<img class="bc-img" src="${esc(e.img)}" alt="" onerror="this.remove()">` : ""}
    </div>
    <div class="bc-meta">${badges(x)} <b>${esc(x.source)}</b> ${eng} <span>${rel(x.publishedAt)}</span></div>
    <div class="bc-url">${esc(x.url)}</div>`;
  document.getElementById("bcProgress").innerHTML = bcItems
    .map((_, i) => `<div class="bc-dot ${i <= bcIndex ? "done" : ""}"></div>`).join("");
  renderPrompter(x);
}

// 프롬프터: 현재 뉴스의 낭독 대본 (첫 화면엔 인트로, 마지막엔 아웃트로 포함)
function renderPrompter(x) {
  const el = document.getElementById("prompter");
  el.classList.toggle("off", !prompterOn);
  document.getElementById("prompterHint").textContent =
    L("📜 대본 — T로 숨김/표시 (이 영역도 녹화에 나옵니다. 안 나오게 하려면 T로 끄고 인쇄본/폰으로 읽으세요)",
      "📜 Script — press T to toggle (this area IS recorded)");
  if (!prompterOn) return;
  const sec = (tag, text) => `<div class="pron-sec"><span class="sec-tag">${tag}</span>${pron(text)}</div>`;
  let html = "";
  const scriptItem = SCRIPT?.items?.find((it) => SCRIPT.top?.[it.rank - 1]?.title === x.title || SCRIPT.top?.find((t) => t.rank === it.rank)?.title === x.title);
  if (bcIndex === 0 && SCRIPT?.intro) html += sec(L("인트로", "Intro"), SCRIPT.intro);
  if (scriptItem) html += sec(`${L("본문", "Main")} · TOP ${scriptItem.rank}`, scriptItem.para);
  else {
    const bullets = bulletsOf(x);
    html += bullets ? sec(L("요점 (완성 대본 없음 — npm run script)", "Key points"), bullets.join(" "))
                    : sec(L("대본 없음", "No script"), x.summary || "");
  }
  if (bcIndex === bcItems.length - 1 && SCRIPT?.outro) html += sec(L("아웃트로", "Outro"), SCRIPT.outro);
  document.getElementById("prompterBody").innerHTML = html;
  el.scrollTop = 0;
}

document.addEventListener("keydown", (e) => {
  const on = document.getElementById("broadcast").classList.contains("on");
  if (on) {
    if (e.key === "ArrowRight" || e.key === " ") { bcIndex = Math.min(bcIndex + 1, bcItems.length - 1); renderBC(); }
    else if (e.key === "ArrowLeft") { bcIndex = Math.max(bcIndex - 1, 0); renderBC(); }
    else if (e.key === "o" || e.key === "O") { window.open(bcItems[bcIndex].url, "_blank"); }
    else if (e.key === "t" || e.key === "T" || e.key === "ㅅ") {
      prompterOn = !prompterOn;
      localStorage.setItem("aiw-prompter", prompterOn ? "on" : "off");
      renderPrompter(bcItems[bcIndex]);
    }
    else if (e.key === "Escape") exitBroadcast();
    e.preventDefault();
  } else if ((e.key === "b" || e.key === "B" || e.key === "ㅠ") && document.activeElement.id !== "search") {
    enterBroadcast();
  }
});

// 한/영 표시 전환
const TAB_LABELS = {
  all: ["전체", "All"], hot: ["🔥 실시간", "🔥 Live"], global: ["해외", "Global"],
  ko: ["국내", "Korea"], paper: ["논문", "Papers"], official: ["공식 발표", "Official"],
};
function applyLang() {
  document.querySelectorAll(".tab[data-f]").forEach((t) => {
    const l = TAB_LABELS[t.dataset.f];
    if (l) t.textContent = L(...l);
  });
  document.getElementById("search").placeholder = L("검색…", "Search…");
  document.querySelector(".btn-broadcast").textContent = L("🎙 방송 모드 (B)", "🎙 Broadcast (B)");
  document.getElementById("langToggle").textContent = L("Aa EN", "Aa 한글");
  document.getElementById("bcHelp").textContent = L("← → 이동 · T 대본 · O 원문 열기 · ESC 종료", "← → move · T script · O open source · ESC exit");
  if (DATA.updatedAt) renderHeaderMeta();
  render();
}
function renderHeaderMeta() {
  const up = new Date(DATA.updatedAt);
  document.getElementById("updatedAt").innerHTML = L(
    `마지막 업데이트 <b>${up.toLocaleString("ko-KR", { month: "long", day: "numeric", hour: "2-digit", minute: "2-digit" })}</b> · 수집 ${DATA.count}건`,
    `Updated <b>${up.toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</b> · ${DATA.count} items`);
  const monday = new Date(DATA.updatedAt - ((new Date(DATA.updatedAt).getDay() + 6) % 7) * 86400000);
  document.getElementById("weekLabel").textContent = L(
    `${monday.getFullYear()}년 ${monday.getMonth() + 1}월 ${Math.ceil(monday.getDate() / 7)}주차`,
    `Week of ${monday.toLocaleString("en-US", { month: "short", day: "numeric" })}`);
}
document.getElementById("langToggle").addEventListener("click", () => {
  LANG = LANG === "ko" ? "en" : "ko";
  localStorage.setItem("aiw-lang", LANG);
  applyLang();
  if (document.getElementById("broadcast").classList.contains("on")) renderBC();
});

function copyDesc(btn) {
  navigator.clipboard.writeText(SCRIPT?.description || "").then(() => {
    btn.textContent = "복사됨 ✓";
    setTimeout(() => (btn.textContent = "복사"), 1500);
  });
}

document.getElementById("tabs").addEventListener("click", (e) => {
  if (!e.target.dataset.f) return;
  filter = e.target.dataset.f;
  document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === e.target));
  render();
});
document.getElementById("search").addEventListener("input", (e) => { query = e.target.value.trim(); render(); });

/* ---------- 로드 ---------- */
setInterval(() => { if (!document.getElementById("broadcast").classList.contains("on")) load(); }, 10 * 60 * 1000);
load();
function load() {
Promise.all([
  fetch("data.json?t=" + Date.now()).then((r) => r.json()),
  fetch("enrich.json?t=" + Date.now()).then((r) => (r.ok ? r.json() : {})).catch(() => ({})),
  fetch("script.json?t=" + Date.now()).then((r) => (r.ok ? r.json() : null)).catch(() => null),
])
  .then(([d, e, s]) => {
    DATA = d;
    ENRICH = e;
    SCRIPT = s;
    applyLang(); // 라벨 + 헤더 + render까지 수행
  })
  .catch(() => { document.getElementById("content").innerHTML = `<div class="empty">data.json이 없습니다 — <code>npm run update</code>를 먼저 실행하세요</div>`; });
}
</script>
